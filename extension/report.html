<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Reporte — Norma Watch Perú</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #1c2430;
      background: #f4f6f9;
      padding: 24px;
    }
    .hoja { background: #fff; max-width: 800px; margin: 0 auto; padding: 36px 44px; border-radius: 10px; box-shadow: 0 3px 14px rgba(0,0,0,.08); }
    .barra { max-width: 800px; margin: 0 auto 14px; display: flex; gap: 8px; justify-content: flex-end; }
    .barra button {
      border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer;
      background: #b91c1c; color: #fff;
    }
    .barra button.sec { background: #475569; }
    header { border-bottom: 3px solid #b91c1c; padding-bottom: 14px; margin-bottom: 20px; }
    h1 { font-size: 22px; color: #b91c1c; }
    .meta { font-size: 12px; color: #64748b; margin-top: 4px; }
    h2 { font-size: 15px; color: #4f46e5; margin: 22px 0 10px; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }
    .resumen-ia { white-space: pre-wrap; font-size: 13px; line-height: 1.55; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px; }
    .norma { padding: 10px 0; border-bottom: 1px dashed #e2e8f0; page-break-inside: avoid; }
    .norma .entidad { font-size: 10px; font-weight: 700; color: #b91c1c; text-transform: uppercase; }
    .norma .titulo { font-size: 13.5px; font-weight: 700; margin: 2px 0; }
    .norma .sumilla { font-size: 12px; color: #475569; }
    .norma .pie { font-size: 11px; color: #64748b; margin-top: 4px; }
    .kw { background: #eef2ff; color: #4338ca; border-radius: 20px; padding: 1px 8px; font-size: 10px; font-weight: 700; margin-right: 4px; }
    .enlace { font-size: 10.5px; color: #4f46e5; word-break: break-all; }
    footer { margin-top: 26px; font-size: 10px; color: #94a3b8; text-align: center; }
    .vacio { color: #94a3b8; font-size: 13px; padding: 12px 0; }
    @media print {
      body { background: #fff; padding: 0; }
      .hoja { box-shadow: none; border-radius: 0; max-width: none; padding: 10mm 12mm; }
      .barra { display: none; }
    }
  </style>
</head>
<body>
  <div class="barra">
    <button class="sec" id="btnTodo">Incluir historial completo</button>
    <button class="sec" data-expr="word">Word</button>
    <button class="sec" data-expr="excel">Excel</button>
    <button class="sec" data-expr="md">Markdown</button>
    <button class="sec" data-expr="json">JSON</button>
    <button id="btnPdf">🖨️ Guardar como PDF</button>
  </div>
  <div class="hoja">
    <header>
      <h1>⚖️ Norma Watch Perú</h1>
      <div class="meta" id="meta"></div>
    </header>
    <section id="secResumen" hidden>
      <h2>✨ Resumen ejecutivo (IA)</h2>
      <div class="resumen-ia" id="resumenIa"></div>
    </section>
    <section>
      <h2 id="tituloNormas">📑 Normas detectadas</h2>
      <div id="listaNormas"><p class="vacio">Sin normas detectadas.</p></div>
    </section>
    <footer>Generado por Norma Watch Perú · Fuentes: Diario Oficial El Peruano y gob.pe · Autor: Pierre R. · peru.labs.pe@gmail.com</footer>
  </div>
  <script src="exportar.js"></script>
  <script src="report.js"></script>
</body>
</html>
