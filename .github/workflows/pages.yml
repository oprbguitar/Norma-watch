name: Desplegar página web (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  desplegar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.despliegue.outputs.page_url }}
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4
      - name: Configurar GitHub Pages (se activa solo)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Empaquetar la carpeta docs
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Publicar
        id: despliegue
        uses: actions/deploy-pages@v4
